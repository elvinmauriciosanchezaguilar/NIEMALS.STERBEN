<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIEMALS STERBEN - ACADEMIA</title>
    <style>
        body { background-color: #000; color: #E0E0A0; font-family: 'Georgia', serif; text-align: center; padding-top: 50px; }
        .logo-container { margin-bottom: 20px; }
        .logo-text { font-size: 2.5em; font-weight: bold; letter-spacing: 3px; color: #E0E0A0; }
        .box { border: 1px solid #E0E0A0; padding: 40px; display: inline-block; border-radius: 5px; background: #0a0a0a; box-shadow: 0 0 20px rgba(224, 224, 160, 0.1); }
        input { padding: 12px; width: 260px; border: 1px solid #E0E0A0; background: #000; color: #fff; margin-bottom: 15px; text-align: center; }
        button { background-color: #E0E0A0; color: #000; padding: 12px 30px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        button:hover { background-color: #fff; box-shadow: 0 0 15px #E0E0A0; }
        #error { color: #ff4444; font-size: 0.9em; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="logo-container">
        <div class="logo-text">NIEMALS STERBEN</div>
        <p style="font-style: italic; letter-spacing: 2px;">Mente • Cuerpo • Técnica</p>
    </div>

    <div class="box">
        <h3>ACCESO PRIVADO</h3>
        <input type="password" id="pass" placeholder="Introduce tu clave"><br>
        <button onclick="entrar()">ENTRAR AL DOJO</button>
        <p id="error">Clave incorrecta. Contacta al Coach vía WhatsApp.</p>
    </div>

    <script>
        function entrar() {
            var input = document.getElementById("pass").value;
            // Tu clave maestra
            if (input === "NIEMALS2026") {
                alert("¡Bienvenido al Dojo, Mauricio!");
                window.location.href = "academia.html";
            } else {
                document.getElementById("error").style.display = "block";
            }
        }
    </script>
</body>
</html>
