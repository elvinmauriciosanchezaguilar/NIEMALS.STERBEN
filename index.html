<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIEMALS STERBEN - ACCESO</title>
    <style>
        body {
            background-color: #000;
            color: #d4af37; /* Dorado */
            font-family: 'Times New Roman', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .logo {
            width: 320px;
            margin-bottom: 25px;
        }
        .login-box {
            background: rgba(15, 15, 15, 0.95);
            padding: 35px;
            border: 1px solid #d4af37;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.15);
        }
        h2 {
            font-size: 1.3em;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        select, input {
            width: 100%;
            padding: 14px;
            margin-bottom: 18px;
            background: #000;
            border: 1px solid #d4af37;
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1em;
        }
        button {
            width: 100%;
            padding: 16px;
            background-color: #d4af37;
            color: #000;
            border: none;
            font-weight: bold;
            font-size: 1.2em;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 4px;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #fff;
            box-shadow: 0 0 20px #fff;
        }
        .frase {
            margin-top: 35px;
            font-style: italic;
            font-size: 1.3em;
            color: #d4af37;
            line-height: 1.5;
        }
        #error { color: #ff4444; display: none; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <img src="NIEMALS STERBEN.png" alt="Niemals Sterben Logo" class="logo">

        <div class="login-box">
            <h2>Por favor, digite sus credenciales</h2>
            
            <p id="error">ACCESO DENEGADO. Verifica con el Coach.</p>

            <input type="text" id="cuenta" placeholder="Número de cuenta (8 dígitos)" maxlength="8">
            <input type="password" id="pass" placeholder="Contraseña">

            <select id="programa">
                <option value="" disabled selected>Seleccione su Programa...</option>
                <option value="infantil">Programa Infantil</option>
                <option value="juvenil">Programa Juvenil</option>
                <option value="adultos">Programa Adultos</option>
                <option value="inclusivo">Programa Inclusivo</option>
            </select>

            <button onclick="validar()">INGRESAR</button>
        </div>

        <div class="frase">
            "Nacer, crecer, triunfar...<br>¡NIEMALS STERBEN!"
        </div>
    </div>

    <script>
        function validar() {
            var programa = document.getElementById("programa").value;
            var cuenta = document.getElementById("cuenta").value;
            var pass = document.getElementById("pass").value;

            // Clave maestra temporal
            if (cuenta.length === 8 && pass === "NIEMALS2026" && programa !== "") {
                alert("¡Acceso concedido! Entrando al sistema de " + programa);
                window.location.href = "academia.html";
            } else {
                document.getElementById("error").style.display = "block";
            }
        }
    </script>

</body>
</html>
