<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIEMALS STERBEN - LOGIN</title>
    <style>
        body {
            background-color: #000;
            color: #d4af37; /* Dorado */
            font-family: 'Times New Roman', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            width: 250px;
            margin-bottom: 20px;
        }
        .input-group {
            background: rgba(20, 20, 20, 0.9);
            padding: 30px;
            border: 2px solid #d4af37;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.2);
        }
        h2 {
            font-size: 1.2em;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        select, input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #1a1a1a;
            border: 1px solid #d4af37;
            color: #fff;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #d4af37;
            color: #000;
            border: none;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 5px;
            transition: 0.3s;
        }
        button:hover {
            background-color: #fff;
            box-shadow: 0 0 15px #fff;
        }
        .frase {
            margin-top: 30px;
            font-style: italic;
            font-size: 1.1em;
            line-height: 1.4;
        }
        #error { color: #ff4444; display: none; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <img src="NIEMALS STERBEN.png" alt="Logo" class="logo">

        <div class="input-group">
            <h2>Por favor, digite sus credenciales</h2>
            
            <p id="error">Datos incorrectos. Verifica con tu Coach.</p>

            <select id="programa">
                <option value="" disabled selected>Programa...</option>
                <option value="infantil">Infantil</option>
                <option value="juvenil">Juvenil</option>
                <option value="adultos">Adultos</option>
                <option value="especial">Especial / Adaptado</option>
            </select>

            <input type="text" id="cuenta" placeholder="Número de cuenta (8 dígitos)" maxlength="8">
            <input type="password" id="pass" placeholder="Contraseña">

            <button onclick="validar()">INGRESAR</button>
        </div>

        <div class="frase">
            "Nacer, crecer, triunfar...<br>¡NIEMALS STERBEN!"
        </div>
    </div>

    <script>
        function validar() {
            var programa = document.getElementById("programa").value;
            var cuenta = document.getElementById("cuenta").value;
            var pass = document.getElementById("pass").value;

            // Validación simple para probar (Clave maestra: NIEMALS2026)
            if (cuenta.length === 8 && pass === "NIEMALS2026" && programa !== "") {
                alert("Acceso concedido al programa " + programa);
                window.location.href = "academia.html";
            } else {
                document.getElementById("error").style.display = "block";
            }
        }
    </script>

</body>
</html>
